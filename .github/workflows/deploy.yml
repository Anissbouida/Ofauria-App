name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image URI
        id: image
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPOSITORY }}/${{ vars.GCP_SERVICE_NAME }}:${{ github.sha }}"
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Image: $IMAGE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPOSITORY }}/${{ vars.GCP_SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    # Meme env que le deploy : reuse les meme secrets/approvers
    environment:
      name: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install deps (server + shared)
        run: npm ci --workspaces --include-workspace-root --ignore-scripts

      - name: Build shared package
        run: cd shared && npx tsc --project tsconfig.json --composite false --declaration --outDir dist

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      # Recupere DATABASE_URL et JWT_SECRET depuis Secret Manager.
      # - DATABASE_URL : reecrit vers 127.0.0.1:5432 (Unix socket Cloud Run -> TCP proxy)
      # - JWT_SECRET : requis par env.ts au demarrage de migrate.ts (validation
      #   eager — env.ts est importe par database.ts qui est importe par migrate.ts).
      - name: Fetch secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            DATABASE_URL:${{ vars.GCP_PROJECT_ID }}/DATABASE_URL
            JWT_SECRET:${{ vars.GCP_PROJECT_ID }}/JWT_SECRET

      - name: Download Cloud SQL Auth Proxy
        run: |
          curl -fSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy (TCP localhost:5432)
        run: |
          ./cloud-sql-proxy --port=5432 ofauria:europe-west1:ofauria-db &
          PROXY_PID=$!
          echo "PROXY_PID=$PROXY_PID" >> "$GITHUB_ENV"
          # Attente readiness max 30s
          for i in {1..30}; do
            if nc -z 127.0.0.1 5432; then
              echo "Cloud SQL Auth Proxy ready on 127.0.0.1:5432"
              exit 0
            fi
            sleep 1
          done
          echo "Cloud SQL Auth Proxy ne demarre pas — abandon"
          exit 1

      - name: Run migrations via proxy
        env:
          # Le secret a un format Cloud Run typique :
          #   postgres://USER:PASS@/DBNAME?host=/cloudsql/INSTANCE
          # Node URL parser refuse le host vide (WHATWG URL strict).
          # On extrait USER:PASS et DBNAME via sed et on reforge avec TCP 127.0.0.1.
          RAW_DATABASE_URL: ${{ steps.secrets.outputs.DATABASE_URL }}
          # env.ts valide JWT_SECRET au load (database.ts l'importe via env.ts).
          # Migrate.ts n'utilise pas JWT mais doit le passer pour ne pas planter
          # au boot.
          JWT_SECRET: ${{ steps.secrets.outputs.JWT_SECRET }}
        run: |
          # Format attendu : postgres(ql)?://USER:PASS@/DBNAME?host=/cloudsql/...
          USER_PASS=$(printf '%s' "$RAW_DATABASE_URL" | sed -E 's|^postgres(ql)?://([^@]+)@.*$|\2|')
          DBNAME=$(printf '%s' "$RAW_DATABASE_URL" | sed -E 's|^.*@/([^?]+)(\?.*)?$|\1|')
          if [[ -z "$USER_PASS" || -z "$DBNAME" || "$USER_PASS" == "$RAW_DATABASE_URL" ]]; then
            echo "Cannot parse DATABASE_URL (format attendu : postgres://user:pass@/dbname?host=...)"
            exit 1
          fi
          PROXY_URL="postgres://${USER_PASS}@127.0.0.1:5432/${DBNAME}"
          # Masque pour eviter le leak du password dans les logs GitHub Actions
          echo "::add-mask::$PROXY_URL"
          echo "::add-mask::$USER_PASS"
          export DATABASE_URL="$PROXY_URL"
          npm run migrate --workspace=server

      - name: Stop Cloud SQL Auth Proxy
        if: always()
        run: |
          if [[ -n "${PROXY_PID:-}" ]]; then
            kill "$PROXY_PID" 2>/dev/null || true
          fi

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    timeout-minutes: 15

    # 🔒 Approbation manuelle: configurer le reviewer dans
    # GitHub > Settings > Environments > production > Required reviewers
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.GCP_SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ needs.build-and-push.outputs.image }}
          # ALLOWED_ORIGINS contient une virgule (separateur d'URLs) dans sa
          # valeur. Le bloc `env_vars: |` de l'action passe la liste a gcloud
          # qui parse la virgule comme delimiteur entre env vars → 2e URL
          # tronquee. On contourne en passant TOUTES les env vars via
          # --set-env-vars avec le separateur custom "^@^" (cf gcloud topic
          # escaping). Les secrets restent dans `secrets:` (pas de probleme).
          flags: >-
            --port=8080
            --allow-unauthenticated
            --add-cloudsql-instances=ofauria:europe-west1:ofauria-db
            --set-env-vars=^@^NODE_ENV=production@SERVER_PORT=8080@ALLOWED_ORIGINS=https://ofauria-app-gpezecanha-ew.a.run.app,https://ofauria-app-54056779982.europe-west1.run.app
          secrets: |
            JWT_SECRET=JWT_SECRET:latest
            DATABASE_URL=DATABASE_URL:latest

      - name: Show service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
