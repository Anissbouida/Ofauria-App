name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image URI
        id: image
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPOSITORY }}/${{ vars.GCP_SERVICE_NAME }}:${{ github.sha }}"
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Image: $IMAGE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPOSITORY }}/${{ vars.GCP_SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    # Meme env que le deploy : reuse les meme secrets/approvers
    environment:
      name: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps (server + shared)
        run: npm ci --workspaces --include-workspace-root --ignore-scripts

      - name: Build shared package
        run: cd shared && npx tsc --project tsconfig.json --composite false --declaration --outDir dist

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Recupere DATABASE_URL depuis Secret Manager (le secret est deja utilise
      # par Cloud Run via `secrets:` plus bas — il a probablement un host Unix
      # socket `host=/cloudsql/<instance>`. On le reecrit vers 127.0.0.1:5432
      # pour passer par le Cloud SQL Auth Proxy.).
      - name: Fetch DATABASE_URL from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            DATABASE_URL:${{ vars.GCP_PROJECT_ID }}/DATABASE_URL

      - name: Download Cloud SQL Auth Proxy
        run: |
          curl -fSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy (TCP localhost:5432)
        run: |
          ./cloud-sql-proxy --port=5432 ofauria:europe-west1:ofauria-db &
          PROXY_PID=$!
          echo "PROXY_PID=$PROXY_PID" >> "$GITHUB_ENV"
          # Attente readiness max 30s
          for i in {1..30}; do
            if nc -z 127.0.0.1 5432; then
              echo "Cloud SQL Auth Proxy ready on 127.0.0.1:5432"
              exit 0
            fi
            sleep 1
          done
          echo "Cloud SQL Auth Proxy ne demarre pas — abandon"
          exit 1

      - name: Run migrations via proxy
        env:
          # Le secret peut avoir un host=/cloudsql/... (Unix socket Cloud Run)
          # ou directement un host IP. On normalise vers 127.0.0.1:5432.
          RAW_DATABASE_URL: ${{ steps.secrets.outputs.DATABASE_URL }}
        run: |
          # Reecriture du DATABASE_URL avec Node URL parser (robuste)
          PROXY_URL=$(node -e "
            const raw = process.env.RAW_DATABASE_URL || '';
            try {
              const u = new URL(raw);
              u.host = '127.0.0.1:5432';
              u.searchParams.delete('host');
              process.stdout.write(u.toString());
            } catch (e) {
              process.stderr.write('Cannot parse DATABASE_URL : ' + e.message + '\n');
              process.exit(1);
            }
          ")
          if [[ -z "$PROXY_URL" ]]; then
            echo "Erreur reecriture DATABASE_URL"
            exit 1
          fi
          export DATABASE_URL="$PROXY_URL"
          # On masque l'URL pour eviter de leaker le password dans les logs
          echo "::add-mask::$DATABASE_URL"
          npm run migrate --workspace=server

      - name: Stop Cloud SQL Auth Proxy
        if: always()
        run: |
          if [[ -n "${PROXY_PID:-}" ]]; then
            kill "$PROXY_PID" 2>/dev/null || true
          fi

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    timeout-minutes: 15

    # 🔒 Approbation manuelle: configurer le reviewer dans
    # GitHub > Settings > Environments > production > Required reviewers
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.GCP_SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ needs.build-and-push.outputs.image }}
          # ALLOWED_ORIGINS contient une virgule (separateur d'URLs) dans sa
          # valeur. Le bloc `env_vars: |` de l'action passe la liste a gcloud
          # qui parse la virgule comme delimiteur entre env vars → 2e URL
          # tronquee. On contourne en passant TOUTES les env vars via
          # --set-env-vars avec le separateur custom "^@^" (cf gcloud topic
          # escaping). Les secrets restent dans `secrets:` (pas de probleme).
          flags: >-
            --port=8080
            --allow-unauthenticated
            --add-cloudsql-instances=ofauria:europe-west1:ofauria-db
            --set-env-vars=^@^NODE_ENV=production@SERVER_PORT=8080@ALLOWED_ORIGINS=https://ofauria-app-gpezecanha-ew.a.run.app,https://ofauria-app-54056779982.europe-west1.run.app
          secrets: |
            JWT_SECRET=JWT_SECRET:latest
            DATABASE_URL=DATABASE_URL:latest

      - name: Show service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
