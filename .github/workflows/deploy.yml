name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image URI
        id: image
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPOSITORY }}/${{ vars.GCP_SERVICE_NAME }}:${{ github.sha }}"
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Image: $IMAGE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPOSITORY }}/${{ vars.GCP_SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 15

    # 🔒 Approbation manuelle: configurer le reviewer dans
    # GitHub > Settings > Environments > production > Required reviewers
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.GCP_SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ needs.build-and-push.outputs.image }}
          # ALLOWED_ORIGINS contient une virgule (separateur d'URLs) dans sa
          # valeur. Le bloc `env_vars: |` de l'action passe la liste a gcloud
          # qui parse la virgule comme delimiteur entre env vars → 2e URL
          # tronquee. On contourne en passant TOUTES les env vars via
          # --set-env-vars avec le separateur custom "^@^" (cf gcloud topic
          # escaping). Les secrets restent dans `secrets:` (pas de probleme).
          flags: >-
            --port=8080
            --allow-unauthenticated
            --add-cloudsql-instances=ofauria:europe-west1:ofauria-db
            --set-env-vars=^@^NODE_ENV=production@SERVER_PORT=8080@ALLOWED_ORIGINS=https://ofauria-app-gpezecanha-ew.a.run.app,https://ofauria-app-54056779982.europe-west1.run.app
          secrets: |
            JWT_SECRET=JWT_SECRET:latest
            DATABASE_URL=DATABASE_URL:latest

      - name: Show service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
